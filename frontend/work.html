<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品详情</title>
    <style>
      :root {
        --page-bg: #f4f6fb;
        --panel-bg: rgba(255, 255, 255, 0.94);
        --panel-border: #d7dce6;
        --panel-shadow: 0 22px 48px rgba(15, 23, 42, 0.08);
        --text-main: #111827;
        --text-muted: #4b5563;
        --accent: #0f766e;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top, rgba(209, 250, 229, 0.8), transparent 28%),
          linear-gradient(180deg, #f8fafc 0%, var(--page-bg) 100%);
      }

      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .site-nav__link,
      .site-nav__auth {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: rgba(255, 255, 255, 0.84);
        color: var(--text-main);
        text-decoration: none;
        cursor: pointer;
      }

      .site-nav__link.is-current,
      .site-nav__link[aria-current="page"] {
        background: #111827;
        border-color: #111827;
        color: #ffffff;
      }

      #work-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(300px, 420px);
        gap: 20px;
      }

      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: var(--panel-shadow);
      }

      .panel-header,
      .meta-list {
        display: grid;
        gap: 10px;
      }

      .meta-block {
        border-radius: 14px;
        padding: 14px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
      }

      #work-manage-panel.is-hidden {
        display: none;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        padding: 8px 12px;
        border-radius: 999px;
        background: #ecfeff;
        border: 1px solid #99f6e4;
        color: #115e59;
      }

      .viewer-shell {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        background: linear-gradient(180deg, #dbeafe 0%, #cbd5e1 100%);
      }

      #viewer-canvas {
        width: 100%;
        height: 560px;
        display: block;
      }

      .work-demo-model {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .work-demo-model.is-hidden {
        display: none;
      }

      .viewer-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .manage-form {
        display: grid;
        gap: 12px;
      }

      input,
      select,
      textarea,
      button,
      a {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #ffffff;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button,
      a.inline-link {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: transparent;
        color: var(--text-main);
        text-decoration: none;
      }

      #work-status,
      #work-viewer-status,
      #work-motion-status,
      #work-interaction-status {
        color: var(--text-muted);
      }

      @media (max-width: 1080px) {
        #work-layout {
          grid-template-columns: 1fr;
        }

        #viewer-canvas {
          height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <p class="eyebrow">作品详情</p>
          <h1 id="work-title">正在加载作品...</h1>
        </div>
        <nav class="site-nav" data-nav-root data-nav-page="work" aria-label="主导航">
          <a class="site-nav__link" data-nav-link="home" href="./index.html">首页</a>
          <a class="site-nav__link" data-nav-link="gallery" href="./gallery.html">画廊</a>
          <a class="site-nav__link" data-nav-link="profile" href="./profile.html">个人页</a>
          <button class="site-nav__auth" data-nav-auth type="button">登录</button>
        </nav>
        <a class="inline-link" href="./gallery.html">返回画廊</a>
      </div>

      <div id="work-layout">
        <section class="panel">
          <div class="panel-header">
            <h2>查看器</h2>
            <p id="work-viewer-status">正在准备查看器...</p>
          </div>
          <div class="viewer-shell">
            <canvas id="viewer-canvas"></canvas>
            <img
              id="work-demo-model"
              class="work-demo-model is-hidden"
              src="./assets/demo-green-model-viewer.png"
              alt=""
              aria-hidden="true"
            />
          </div>
          <div class="viewer-toolbar">
            <label>
              人物 GLB 地址
              <input id="person-url" type="url" />
            </label>
            <label>
              守护灵 GLB 地址
              <input id="guardian-url" type="url" />
            </label>
          </div>
          <div class="viewer-toolbar">
            <label>
              当前模型
              <select id="resource-type">
                <option value="person">人物</option>
                <option value="guardian">守护灵</option>
              </select>
            </label>
            <label>
              天空盒 URL（可选）
              <input id="skybox-url" type="url" />
            </label>
            <button id="load-model" type="button">加载模型</button>
            <button id="play-idle" type="button">待机</button>
            <button id="play-wave" type="button">摇摆</button>
          </div>
          <div class="viewer-toolbar">
            <div id="work-motion-status">动作系统：等待模型加载。</div>
            <div id="work-interaction-status">交互系统：等待模型加载。</div>
          </div>
        </section>

        <section class="panel meta-list">
          <div class="panel-header">
            <h2>作品信息</h2>
            <p id="work-status">正在加载只读详情...</p>
          </div>
          <div class="meta-block">
            <strong>描述</strong>
            <p id="work-description">暂无描述。</p>
          </div>
          <div class="meta-block">
            <strong>作者</strong>
            <p id="work-author">未知</p>
          </div>
          <div class="meta-block">
            <strong>可见性</strong>
            <p id="work-visibility">未知</p>
          </div>
          <div class="meta-block">
            <strong>创建时间</strong>
            <p id="work-created-at">未知</p>
          </div>
          <div class="meta-block">
            <strong>风格标签</strong>
            <div id="work-tags" class="tag-list"></div>
          </div>
          <section id="work-manage-panel" class="meta-block is-hidden">
            <strong>作者操作</strong>
            <p id="work-manage-status">作者控制区已隐藏。</p>
            <form id="edit-work-form" class="manage-form">
              <label>
                标题
                <input id="edit-title" type="text" />
              </label>
              <label>
                描述
                <textarea id="edit-description"></textarea>
              </label>
              <label>
                可见性
                <select id="edit-visibility">
                  <option value="public">公开</option>
                  <option value="private">私密</option>
                </select>
              </label>
              <label>
                <input id="edit-allow-remix" type="checkbox" />
                允许二次创作
              </label>
              <div class="viewer-toolbar">
                <button id="save-work" type="submit">保存</button>
                <button id="delete-work" type="button">删除</button>
              </div>
            </form>
          </section>
        </section>
      </div>
    </main>
    <script type="module" src="./js/nav.js"></script>
    <script type="module" src="./js/work.js"></script>
  </body>
</html>
