<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bazi3d 个人主页</title>
    <style>
      :root {
        --page-bg: #f4f6fb;
        --panel-bg: rgba(255, 255, 255, 0.96);
        --panel-border: #d7dce6;
        --text-main: #111827;
        --text-muted: #4b5563;
        --accent: #0f766e;
        --accent-soft: #e7f8f3;
        --dark: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        color: var(--text-main);
        background:
          linear-gradient(90deg, rgba(240, 253, 250, 0.82), rgba(248, 250, 252, 0.96) 42%),
          var(--page-bg);
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 42px;
      }

      .topbar,
      .site-nav,
      .metric-grid,
      .work-actions,
      .asset-line {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topbar {
        justify-content: space-between;
        margin-bottom: 22px;
      }

      .site-nav__link,
      .site-nav__auth,
      .work-actions a {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: rgba(255, 255, 255, 0.9);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
        font: inherit;
      }

      .site-nav__link.is-current,
      .site-nav__link[aria-current="page"] {
        background: var(--dark);
        border-color: var(--dark);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 14px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .account-card,
      .metric,
      .work-row {
        border: 1px solid #e5e7eb;
        background: #f8fafc;
        border-radius: 10px;
        padding: 14px;
      }

      .account-card {
        display: grid;
        gap: 8px;
      }

      .metric-grid {
        align-items: stretch;
      }

      .metric {
        flex: 1 1 160px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      .management-header {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .work-table {
        display: grid;
        gap: 10px;
      }

      .work-row {
        display: grid;
        grid-template-columns: minmax(190px, 1.15fr) minmax(220px, 1fr) auto;
        gap: 12px;
        align-items: center;
      }

      .work-row h3 {
        font-size: 18px;
      }

      .asset-line {
        color: var(--text-muted);
        font-size: 14px;
      }

      .asset-type {
        display: inline-flex;
        padding: 5px 9px;
        border-radius: 999px;
        border: 1px solid #99f6e4;
        background: var(--accent-soft);
        color: #115e59;
      }

      .muted {
        color: var(--text-muted);
      }

      #profile-email {
        overflow-wrap: anywhere;
      }

      @media (max-width: 920px) {
        .layout,
        .work-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <p class="eyebrow">个人主页</p>
          <h1>我的作品管理</h1>
        </div>
        <nav class="site-nav" data-nav-root data-nav-page="profile" aria-label="主导航">
          <a class="site-nav__link" data-nav-link="home" href="./index.html">首页</a>
          <a class="site-nav__link" data-nav-link="gallery" href="./gallery.html">画廊</a>
          <a class="site-nav__link" data-nav-link="profile" href="./profile.html">个人页</a>
          <button class="site-nav__auth" data-nav-auth type="button">登录</button>
        </nav>
      </div>

      <div class="layout">
        <aside class="panel stack">
          <section class="account-card">
            <p class="eyebrow">当前账号</p>
            <h2 id="profile-username">正在加载用户...</h2>
            <p id="profile-email" class="muted">正在检查本地会话...</p>
          </section>
          <section class="account-card">
            <strong>状态</strong>
            <p id="profile-status" class="muted">正在加载作品管理数据...</p>
          </section>
          <section class="account-card">
            <strong>管理说明</strong>
            <p class="muted">这里显示当前账号下的作品、资产来源和管理入口，用于和公开画廊区分。</p>
          </section>
        </aside>

        <section class="panel">
          <div class="management-header">
            <p class="eyebrow">作品管理台</p>
            <h2>已发布作品</h2>
            <p class="muted">个人主页侧重账号内作品管理，展示模型资产、公开状态和详情入口。</p>
          </div>

          <div class="metric-grid" aria-label="作品统计">
            <div class="metric">
              <span class="muted">作品数量</span>
              <strong id="profile-work-count">0</strong>
            </div>
            <div class="metric">
              <span class="muted">公开作品</span>
              <strong id="profile-public-count">0</strong>
            </div>
            <div class="metric">
              <span class="muted">模型资产</span>
              <strong id="profile-asset-count">0</strong>
            </div>
          </div>

          <div id="profile-works-list" class="work-table" aria-label="个人作品列表"></div>
        </section>
      </div>
    </main>
    <script type="module" src="./js/nav.js"></script>
    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
