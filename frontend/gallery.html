<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品广场</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #4b5563;
        --line: #d7dce6;
        --panel: rgba(255, 255, 255, 0.94);
        --soft: #f8fafc;
        --accent: #0f766e;
        --dark: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(240, 253, 250, 0.75), rgba(248, 250, 252, 0.94) 36%),
          #f4f6fb;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 42px;
      }

      .topbar,
      .site-nav,
      .gallery-summary,
      .work-actions,
      .work-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topbar,
      .gallery-summary {
        justify-content: space-between;
      }

      .topbar {
        margin-bottom: 22px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 14px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .site-nav__link,
      .site-nav__auth,
      .work-actions a {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: rgba(255, 255, 255, 0.9);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
        font: inherit;
      }

      .site-nav__link.is-current,
      .site-nav__link[aria-current="page"] {
        background: var(--dark);
        border-color: var(--dark);
        color: #ffffff;
      }

      .gallery-shell {
        display: grid;
        gap: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      }

      .gallery-grid,
      #gallery-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .work-card {
        display: grid;
        gap: 10px;
        min-height: 220px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: var(--soft);
        padding: 14px;
      }

      .work-preview {
        overflow: hidden;
        min-height: 92px;
        border-radius: 10px;
        border: 1px solid #dbe4ee;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.14), rgba(37, 99, 235, 0.11)),
          repeating-linear-gradient(90deg, rgba(15, 23, 42, 0.08) 0 1px, transparent 1px 36px);
      }

      .work-preview.has-thumbnail {
        background: #eef3f0;
      }

      .work-preview.is-unavailable {
        background:
          linear-gradient(135deg, rgba(148, 163, 184, 0.18), rgba(226, 232, 240, 0.76)),
          repeating-linear-gradient(135deg, rgba(71, 85, 105, 0.16) 0 1px, transparent 1px 18px);
      }

      .work-preview img {
        display: block;
        width: 100%;
        height: 154px;
        object-fit: cover;
      }

      .work-card h2 {
        font-size: 20px;
      }

      .work-meta,
      .muted {
        color: var(--muted);
      }

      .work-meta {
        font-size: 14px;
      }

      .pill {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #99f6e4;
        background: #e7f8f3;
        color: #115e59;
      }

      @media (max-width: 980px) {
        .gallery-grid,
        #gallery-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <p class="eyebrow">作品广场</p>
          <h1>公开作品集</h1>
        </div>
        <nav class="site-nav" data-nav-root data-nav-page="gallery" aria-label="主导航">
          <a class="site-nav__link" data-nav-link="home" href="./index.html">首页</a>
          <a class="site-nav__link" data-nav-link="gallery" href="./gallery.html">画廊</a>
          <a class="site-nav__link" data-nav-link="profile" href="./profile.html">个人页</a>
          <button class="site-nav__auth" data-nav-auth type="button">登录</button>
        </nav>
      </div>

      <section class="gallery-shell">
        <div class="gallery-summary">
          <div>
            <h2>作品列表</h2>
            <p id="gallery-status" class="muted">正在加载公开作品...</p>
          </div>
          <span class="pill">公开可见</span>
        </div>
        <div id="gallery-list" class="gallery-grid"></div>
      </section>
    </main>
    <script type="module" src="./js/nav.js"></script>
    <script type="module" src="./js/gallery.js"></script>
  </body>
</html>
