<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bazi3d 画廊</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      #gallery-list {
        display: grid;
        gap: 12px;
      }

      .work-card {
        border: 1px solid #ccc;
        padding: 12px;
      }

      a,
      button {
        font: inherit;
      }

      .site-nav__link,
      .site-nav__auth {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .site-nav__link.is-current,
      .site-nav__link[aria-current="page"] {
        background: #111827;
        border-color: #111827;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>画廊</h1>
        <nav class="site-nav" data-nav-root data-nav-page="gallery" aria-label="主导航">
          <a class="site-nav__link" data-nav-link="home" href="./index.html">首页</a>
          <a class="site-nav__link" data-nav-link="gallery" href="./gallery.html">画廊</a>
          <a class="site-nav__link" data-nav-link="profile" href="./profile.html">个人页</a>
          <button class="site-nav__auth" data-nav-auth type="button">登录</button>
        </nav>
      </div>
      <div id="gallery-status">正在加载作品...</div>
      <div id="gallery-list"></div>
    </main>
    <script type="module" src="./js/nav.js"></script>
    <script type="module" src="./js/gallery.js"></script>
  </body>
</html>
