<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号登录</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
        color: #1f2937;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      input,
      button,
      a {
        font: inherit;
      }

      input {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      button {
        padding: 10px 14px;
        border: 0;
        border-radius: 8px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
      }

      #auth-status {
        min-height: 24px;
        margin-bottom: 16px;
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page-header">
        <h1>系统账号</h1>
        <a href="./index.html">返回创建页</a>
      </div>
      <div id="auth-status" role="status">登录或注册账号后即可继续。</div>
      <div class="panel-grid">
        <section class="panel">
          <h2>账号登录</h2>
          <form id="login-form">
            <label>
              邮箱
              <input id="login-email" type="email" autocomplete="email" required />
            </label>
            <label>
              密码
              <input id="login-password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">登录</button>
          </form>
        </section>
        <section class="panel">
          <h2>注册账号</h2>
          <form id="register-form">
            <label>
              邮箱
              <input id="register-email" type="email" autocomplete="email" required />
            </label>
            <label>
              用户名
              <input id="register-username" type="text" autocomplete="username" required />
            </label>
            <label>
              密码
              <input id="register-password" type="password" autocomplete="new-password" required />
            </label>
            <button type="submit">注册</button>
          </form>
        </section>
      </div>
    </main>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
