<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazi3D 3D模型查看器</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #4b5563;
        --line: #d8dee8;
        --panel: rgba(255, 255, 255, 0.95);
        --accent: #7c3aed;
        --dark: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(221, 214, 254, 0.72), transparent 34%),
          linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      }

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 24px 18px 42px;
      }

      .topbar,
      .site-nav,
      .viewer-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topbar {
        margin-bottom: 22px;
      }

      .site-nav,
      .viewer-toolbar {
        justify-content: flex-start;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .eyebrow {
        margin-bottom: 6px;
        color: var(--accent);
        font-size: 14px;
      }

      .site-nav__link,
      .site-nav__auth,
      button,
      input,
      select {
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 10px 14px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        text-decoration: none;
      }

      input {
        min-width: min(420px, 100%);
      }

      button {
        cursor: pointer;
      }

      .site-nav__link.is-current,
      .site-nav__link[aria-current="page"],
      button.primary {
        background: var(--dark);
        border-color: var(--dark);
        color: #fff;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
        gap: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 20px 42px rgba(15, 23, 42, 0.08);
      }

      .viewer-shell {
        position: relative;
        overflow: hidden;
        border-radius: 14px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        margin: 16px 0;
      }

      #viewer-canvas {
        display: block;
        width: 100%;
        height: 540px;
      }

      .demo-model {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100%;
        height: 100%;
        transform: translate(-50%, -50%);
        object-fit: cover;
        pointer-events: none;
      }

      .status-grid,
      .side-stack {
        display: grid;
        gap: 12px;
      }

      .status-card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f8fafc;
        padding: 14px;
      }

      .muted {
        color: var(--muted);
      }

      .is-hidden {
        display: none;
      }

      @media (max-width: 940px) {
        .layout {
          grid-template-columns: 1fr;
        }

        #viewer-canvas {
          height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main id="screenshot-viewer-page">
      <div class="topbar">
        <div>
          <p class="eyebrow">3D模型查看器</p>
          <h1>模型资源加载与交互展示</h1>
        </div>
        <nav class="site-nav" data-nav-root data-nav-page="home" aria-label="主导航">
          <a class="site-nav__link" data-nav-link="home" href="./index.html">首页</a>
          <a class="site-nav__link" data-nav-link="gallery" href="./gallery.html">画廊</a>
          <a class="site-nav__link" data-nav-link="profile" href="./profile.html">个人页</a>
          <button class="site-nav__auth" data-nav-auth type="button">登录</button>
        </nav>
      </div>

      <div class="layout">
        <section class="panel">
          <h2>Web 3D展示区域</h2>
          <p class="muted">查看器负责加载人物或守护灵 GLB 资源，并提供模型切换、动作状态和悬停交互状态。</p>
          <div class="viewer-shell">
            <canvas id="viewer-canvas"></canvas>
            <img
              id="demo-model"
              class="demo-model"
              src="./assets/demo-green-model-viewer.png"
              alt=""
              aria-hidden="true"
            />
          </div>
          <div class="viewer-toolbar">
            <select id="resource-type">
              <option value="person">人物模型</option>
              <option value="guardian">守护灵模型</option>
            </select>
            <input id="person-url" type="url" placeholder="人物 GLB 地址" />
            <input id="guardian-url" type="url" placeholder="守护灵 GLB 地址" />
            <input id="skybox-url" type="url" placeholder="天空盒 URL（可选）" />
            <button class="primary" id="load-model" type="button">加载模型</button>
          </div>
        </section>

        <aside class="panel side-stack">
          <div>
            <h2>查看器状态</h2>
            <p class="muted">查看器显示当前生成资源，可切换人物或守护灵模型并观察交互状态。</p>
          </div>
          <div class="status-grid">
            <div class="status-card">
              <h3>资源状态</h3>
              <p id="viewer-status" class="muted">演示模型已显示，可输入 GLB 地址加载真实资源。</p>
            </div>
            <div class="status-card">
              <h3>动作状态</h3>
              <p id="motion-status" class="muted">伪动作系统：等待模型加载。</p>
            </div>
            <div class="status-card">
              <h3>交互状态</h3>
              <p id="interaction-status" class="muted">悬停交互：请先加载模型。</p>
            </div>
          </div>
          <div class="viewer-toolbar">
            <button id="play-idle" type="button">待机</button>
            <button id="play-wave" type="button">挥手</button>
          </div>
        </aside>
      </div>
    </main>
    <script type="module" src="./js/nav.js"></script>
    <script type="module" src="./js/viewer-page.js"></script>
  </body>
</html>
